name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "dev"]

jobs:
  ui-checks:
    name: UI Checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci-build-pass@localhost:5432/mycarpal?schema=public
      DIRECT_URL: postgresql://ci:ci-build-pass@localhost:5432/mycarpal?schema=public
      BETTER_AUTH_SECRET: ci-build-secret-0123456789abcdef
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_SOCIAL_AUTH: "0"
      FILE_STORAGE_DRIVER: local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma client generate
        run: npm run db:generate

      - name: Check UI tokens
        run: npm run check:ui-tokens

      - name: Check UI package boundary
        run: npm run check:ui-boundary

      - name: Check UI package output
        run: npm run check:ui-pack

      - name: Typecheck UI package
        run: npm run build:ui

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci-build-pass@localhost:5432/mycarpal?schema=public
      DIRECT_URL: postgresql://ci:ci-build-pass@localhost:5432/mycarpal?schema=public
      BETTER_AUTH_SECRET: ci-build-secret-0123456789abcdef
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_SOCIAL_AUTH: "0"
      FILE_STORAGE_DRIVER: local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma client generate
        run: npm run db:generate

      - name: Typecheck app
        run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci-build-pass@localhost:5432/mycarpal?schema=public
      DIRECT_URL: postgresql://ci:ci-build-pass@localhost:5432/mycarpal?schema=public
      BETTER_AUTH_SECRET: ci-build-secret-0123456789abcdef
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_SOCIAL_AUTH: "0"
      FILE_STORAGE_DRIVER: local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma client generate
        run: npm run db:generate

      - name: Lint
        run: npm run lint

  tests:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mycarpal
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci-build-pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci-build-pass@localhost:5432/mycarpal?schema=public
      DIRECT_URL: postgresql://ci:ci-build-pass@localhost:5432/mycarpal?schema=public
      BETTER_AUTH_SECRET: ci-build-secret-0123456789abcdef
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_SOCIAL_AUTH: "0"
      FILE_STORAGE_DRIVER: local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma client generate
        run: npm run db:generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test

  design-system:
    name: Design System
    runs-on: ubuntu-latest
    needs: [ui-checks, typecheck, lint, tests]
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://ci:ci-build-pass@localhost:5432/mycarpal?schema=public
      DIRECT_URL: postgresql://ci:ci-build-pass@localhost:5432/mycarpal?schema=public
      BETTER_AUTH_SECRET: ci-build-secret-0123456789abcdef
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_SOCIAL_AUTH: "0"
      FILE_STORAGE_DRIVER: local
      VERIFY_DESIGN_SYSTEM_SKIP_FAST: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma client generate
        run: npm run db:generate

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Design-system verification
        run: npm run verify:design-system

  app-checks:
    name: App Checks
    runs-on: ubuntu-latest
    needs: [ui-checks, typecheck, lint, tests, design-system]
    if: ${{ always() }}

    steps:
      - name: Verify required CI jobs
        env:
          UI_CHECKS_RESULT: ${{ needs.ui-checks.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          DESIGN_SYSTEM_RESULT: ${{ needs.design-system.result }}
        run: |
          failed=0

          for check in \
            "UI Checks:${UI_CHECKS_RESULT}" \
            "Typecheck:${TYPECHECK_RESULT}" \
            "Lint:${LINT_RESULT}" \
            "Tests:${TESTS_RESULT}" \
            "Design System:${DESIGN_SYSTEM_RESULT}"
          do
            name="${check%%:*}"
            result="${check#*:}"

            if [ "$result" != "success" ]; then
              echo "::error title=${name} failed::${name} finished with result '${result}'."
              failed=1
            fi
          done

          exit "$failed"
