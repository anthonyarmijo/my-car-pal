name: Notify Private Repo

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  dispatch:
    name: Dispatch to Private Repo
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Repository Dispatch
        env:
          CROSS_REPO_DISPATCH_PAT: ${{ secrets.CROSS_REPO_DISPATCH_PAT }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REPOSITORY}" != "anthonyarmijo/my-car-pal" ]; then
            echo "Skipping private dispatch outside the canonical public repo."
            exit 0
          fi

          if [ -z "${CROSS_REPO_DISPATCH_PAT}" ]; then
            echo "Skipping private dispatch because CROSS_REPO_DISPATCH_PAT is not configured."
            exit 0
          fi

          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${CROSS_REPO_DISPATCH_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/anthonyarmijo/my-car-pal-private/dispatches \
            --data-binary @- <<JSON
            {
              "event_type": "public-core-updated",
              "client_payload": {
                "sha": "${GITHUB_SHA}",
                "ref": "${GITHUB_REF}"
              }
            }
          JSON
