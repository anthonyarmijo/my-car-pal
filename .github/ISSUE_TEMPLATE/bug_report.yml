name: Bug report
description: Report a reproducible problem in the public core
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Start the app with Docker/Postgres
        2. Sign in
        3. Open ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser, Docker/Postgres details.
      placeholder: "macOS 15, Node 20, Chrome, Docker Compose"
  - type: checkboxes
    id: boundary
    attributes:
      label: Boundary check
      options:
        - label: This issue is about the self-hosted application, not hosted-service billing, deployment, or account support.
          required: true
