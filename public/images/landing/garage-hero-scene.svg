<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMax slice" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF6EB"/>
      <stop offset="1" stop-color="#F2EBD9"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAE0C9"/>
      <stop offset="1" stop-color="#DFD3B4"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DCEAE4"/>
      <stop offset="0.55" stop-color="#F2EFD2"/>
      <stop offset="1" stop-color="#FFF3CE"/>
    </linearGradient>
    <linearGradient id="spill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF0C2" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#FFF0C2" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.32" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#FFF7DA" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFF7DA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- interior wall + floor -->
  <rect width="1600" height="640" fill="url(#wall)"/>
  <rect y="640" width="1600" height="260" fill="url(#floor)"/>
  <rect y="636" width="1600" height="8" fill="#DCCFAF"/>

  <!-- subtle vertical wall panelling -->
  <g stroke="#E9E0CA" stroke-width="3" opacity="0.55">
    <path d="M110 0V636M230 0V636M350 0V636M470 0V636M590 0V636M710 0V636"/>
  </g>

  <!-- open garage door: bright outdoors -->
  <g>
    <!-- header beam and side frames -->
    <rect x="742" y="42" width="836" height="602" rx="14" fill="#F7F1E0"/>
    <rect x="742" y="42" width="836" height="602" rx="14" fill="none" stroke="#E4D9BD" stroke-width="3"/>
    <!-- raised door panel peeking below the header -->
    <rect x="768" y="66" width="784" height="34" rx="8" fill="#EFE7D0"/>
    <rect x="768" y="104" width="784" height="10" rx="5" fill="#E4DAC0"/>

    <!-- the outdoors -->
    <g>
      <rect x="768" y="120" width="784" height="524" fill="url(#sky)"/>
      <rect x="768" y="120" width="784" height="524" fill="url(#sunGlow)"/>
      <!-- distant tree line -->
      <g fill="#C4D4A8">
        <ellipse cx="880" cy="420" rx="150" ry="72"/>
        <ellipse cx="1120" cy="405" rx="190" ry="86"/>
        <ellipse cx="1400" cy="418" rx="180" ry="78"/>
      </g>
      <!-- mid greenery -->
      <g fill="#A9BF8C">
        <ellipse cx="960" cy="470" rx="170" ry="66"/>
        <ellipse cx="1310" cy="465" rx="200" ry="70"/>
      </g>
      <!-- one soft tree with trunk -->
      <g>
        <rect x="1052" y="392" width="16" height="96" rx="7" fill="#A98D66"/>
        <ellipse cx="1060" cy="352" rx="86" ry="64" fill="#93AF7C"/>
        <ellipse cx="1016" cy="382" rx="52" ry="38" fill="#A3BC8B"/>
        <ellipse cx="1108" cy="384" rx="54" ry="40" fill="#9CB584"/>
      </g>
      <!-- near bushes along the driveway edge -->
      <g fill="#8FAC79">
        <ellipse cx="830" cy="530" rx="110" ry="46"/>
        <ellipse cx="1500" cy="536" rx="130" ry="50"/>
      </g>
      <!-- driveway -->
      <rect x="768" y="560" width="784" height="84" fill="#E8DCBB"/>
      <rect x="768" y="556" width="784" height="8" fill="#D9CBA6"/>
    </g>
  </g>

  <!-- warm light spilling from the opening onto the garage floor -->
  <polygon points="790,644 1552,644 1600,900 660,900" fill="url(#spill)"/>

  <!-- wooden shelf with plants, upper left (kept high, clear of the headline) -->
  <g>
    <rect x="150" y="96" width="360" height="14" rx="6" fill="#D8C49C"/>
    <path d="M186 110 l-12 30 h12 z" fill="#C7B189"/>
    <path d="M474 110 l-12 30 h12 z" fill="#C7B189"/>

    <!-- potted plant: layered leaves -->
    <g>
      <path d="M208 96 h46 l-6 -34 h-34 z" fill="#C77E52"/>
      <ellipse cx="216" cy="48" rx="17" ry="26" fill="#7C9B79" transform="rotate(-24 216 48)"/>
      <ellipse cx="244" cy="44" rx="17" ry="27" fill="#8FAC89" transform="rotate(18 244 44)"/>
      <ellipse cx="230" cy="38" rx="14" ry="26" fill="#6A8D6E"/>
    </g>

    <!-- stacked books / tins -->
    <rect x="292" y="68" width="66" height="11" rx="4" fill="#CDBB93"/>
    <rect x="299" y="55" width="52" height="11" rx="4" fill="#DACA9F"/>
    <rect x="306" y="42" width="38" height="11" rx="4" fill="#C2B08A"/>

    <!-- trailing plant in a jar -->
    <g>
      <rect x="398" y="68" width="36" height="28" rx="8" fill="#E7DAB9"/>
      <ellipse cx="409" cy="60" rx="12" ry="16" fill="#8FAC89" transform="rotate(-16 409 60)"/>
      <ellipse cx="427" cy="58" rx="11" ry="15" fill="#7C9B79" transform="rotate(20 427 58)"/>
      <path d="M402 96 q-9 24 3 40" fill="none" stroke="#8FAC89" stroke-width="6" stroke-linecap="round"/>
      <circle cx="406" cy="140" r="6" fill="#7C9B79"/>
    </g>
  </g>

  <!-- tall floor plant, far left -->
  <g>
    <path d="M52 640 h74 l-10 -58 h-54 z" fill="#B98A5F"/>
    <ellipse cx="66" cy="520" rx="24" ry="52" fill="#7C9B79" transform="rotate(-18 66 520)"/>
    <ellipse cx="112" cy="514" rx="24" ry="56" fill="#8FAC89" transform="rotate(14 112 514)"/>
    <ellipse cx="88" cy="500" rx="20" ry="58" fill="#6A8D6E"/>
    <ellipse cx="104" cy="540" rx="16" ry="34" fill="#93AF7C" transform="rotate(30 104 540)"/>
  </g>
</svg>
