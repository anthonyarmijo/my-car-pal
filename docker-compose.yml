services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    environment:
      POSTGRES_DB: mycarpal
      POSTGRES_USER: mycarpal
      POSTGRES_PASSWORD: mycarpal_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycarpal -d mycarpal"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    ports:
      - "${ADMINER_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      INTERNAL_AUTH_BASE_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://mycarpal:mycarpal_dev@postgres:5432/mycarpal?schema=public
      DIRECT_URL: postgresql://mycarpal:mycarpal_dev@postgres:5432/mycarpal?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-dev-secret-change-me}
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
      FILE_STORAGE_DRIVER: ${FILE_STORAGE_DRIVER:-local}
      NEXT_PUBLIC_ENABLE_SOCIAL_AUTH: ${NEXT_PUBLIC_ENABLE_SOCIAL_AUTH:-0}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
      BLOB_STORE_ID: ${BLOB_STORE_ID:-}

volumes:
  postgres_data:
